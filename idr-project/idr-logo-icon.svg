<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cube top face -->
  <polygon points="50,10 85,28 50,46 15,28" fill="#FF6B00"/>

  <!-- Cube left face -->
  <polygon points="15,28 50,46 50,82 15,64" fill="#CC4400"/>

  <!-- Cube right face -->
  <polygon points="85,28 50,46 50,82 85,64" fill="#E85500"/>

  <!-- Inner diamond / risk lens -->
  <polygon
    points="50,30 62,46 50,62 38,46"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2.5"
    opacity="0.95"
  />

  <!-- Centre dot -->
  <circle cx="50" cy="46" r="4" fill="#FFFFFF" filter="url(#glow)"/>
</svg>